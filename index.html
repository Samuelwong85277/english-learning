<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Lab 鉁?/title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#0f0f23;color:#e0e0e0;padding:12px;min-height:100vh}
.container{max-width:880px;margin:0 auto}
.header{background:linear-gradient(135deg,#6c5ce7 0%,#a29bfe 50%,#fd79a8 100%);border-radius:14px;padding:14px 18px;color:#fff;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.header h1{font-size:20px;letter-spacing:1px}
.header .sub{font-size:10px;opacity:.7}
.btn{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:4px 12px;border-radius:16px;cursor:pointer;font-size:11px;transition:.2s}
.btn:hover{background:rgba(255,255,255,0.35)}
.tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto}
.tab{padding:6px 12px;border-radius:8px 8px 0 0;cursor:pointer;font-size:11px;font-weight:600;background:#1a1a35;color:#636e72;white-space:nowrap;border:1px solid transparent;border-bottom:none;transition:.2s}
.tab:hover{background:#2a2a50;color:#a29bfe}
.tab.active{background:#2a2a50;color:#fff;border-color:#6c5ce7;box-shadow:0 -2px 8px rgba(108,92,231,.3)}
.theme-emoji{font-size:16px;margin-right:4px}
.grid{display:grid;grid-template-columns:1fr 240px;gap:10px}
@media(max-width:740px){.grid{display:flex;flex-direction:column}}

/* ===== ILLUSTRATIONS ===== */
.scene-box{background:linear-gradient(135deg,#1a1a35,#2a1a40);border-radius:10px;padding:14px;margin-bottom:10px;text-align:center;border:1px solid #2a2a50;overflow:hidden;position:relative}
.scene-box .scene-art{font-size:2.2em;line-height:1.4;letter-spacing:3px;user-select:none;animation:sceneFloat 4s ease-in-out infinite}
@keyframes sceneFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.scene-box .scene-label{font-size:10px;color:#636e72;margin-top:2px;letter-spacing:2px}
.scene-box .scene-bg{position:absolute;top:-30%;left:-10%;width:120%;height:140%;background:radial-gradient(ellipse at center,rgba(108,92,231,.08) 0%,transparent 70%);pointer-events:none}

/* ===== PHONICS TUTORIAL ===== */
.ph-panel{background:#1a1a35;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #2a2a50;overflow:hidden}
.ph-panel .t{font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ph-panel .t .emo{font-size:16px}

/* Rule Cards */
.rule-cards{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.rule-card{border-radius:6px;padding:7px 9px;font-size:10px;cursor:pointer;transition:.25s;border:1px solid transparent;position:relative;overflow:hidden}
.rule-card:hover{transform:translateX(3px)}
.rule-card.vccv{background:linear-gradient(135deg,rgba(108,92,231,.2),rgba(108,92,231,.05));border-color:rgba(108,92,231,.3)}
.rule-card.vccv .rc-icon{color:#a29bfe}
.rule-card.vcv{background:linear-gradient(135deg,rgba(0,184,148,.2),rgba(0,184,148,.05));border-color:rgba(0,184,148,.3)}
.rule-card.vcv .rc-icon{color:#00b894}
.rule-card.other{background:linear-gradient(135deg,rgba(253,121,168,.2),rgba(253,121,168,.05));border-color:rgba(253,121,168,.3)}
.rule-card.other .rc-icon{color:#fd79a8}
.rule-card.active{border-color:#fff!important;box-shadow:0 0 12px rgba(108,92,231,.3)}
.rule-card .rc-title{font-weight:700;font-size:11px;display:flex;align-items:center;gap:4px}
.rule-card .rc-desc{color:#636e72;margin-top:1px;padding-left:18px}
.rule-card .rc-example{background:rgba(0,0,0,.2);border-radius:3px;padding:3px 6px;margin-top:3px;display:inline-block;font-family:monospace;font-size:11px}

/* Demo word splitter */
.split-demo{background:#2a2a50;border-radius:8px;padding:10px;margin:8px 0;position:relative}
.split-demo .sd-title{font-size:10px;color:#636e72;margin-bottom:4px}
.split-demo .sd-word{font-size:20px;font-family:monospace;text-align:center;padding:6px 0;letter-spacing:1px;transition:.3s}
.split-demo .sd-word .vowel{color:#fd79a8;font-weight:700}
.split-demo .sd-word .cons{color:#81ecec}
.split-demo .sd-word .cut{display:inline-block;color:#ffeaa7;font-weight:700;position:relative;animation:cutPop .4s ease-out}
@keyframes cutPop{0%{opacity:0;transform:scale(2)}100%{opacity:1;transform:scale(1)}}
.split-demo .sd-word .cut::after{content:'鉁傦笍';position:absolute;left:50%;top:-18px;transform:translateX(-50%);font-size:12px;animation:scissorDrop .4s ease-out}
@keyframes scissorDrop{0%{opacity:0;transform:translateX(-50%) translateY(5px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.split-demo .sd-result{text-align:center;margin-top:5px}
.split-demo .sd-result .syl{display:inline-block;background:#6c5ce7;color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;margin:2px;animation:sylPop .3s ease-out}
@keyframes sylPop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
.split-demo .sd-hint{text-align:center;font-size:10px;color:#636e72;margin-top:4px}

/* Tutorial step buttons */
.tut-steps{display:flex;gap:3px;margin:6px 0}
.tut-step{flex:1;text-align:center;padding:3px 0;border-radius:4px;font-size:9px;cursor:pointer;transition:.2s;background:#1a1a35;color:#636e72;border:1px solid #2a2a50}
.tut-step.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.tut-step.done{background:rgba(0,184,148,.2);color:#00b894;border-color:#00b894}

/* Tutor prompt */
.tut-prompt{background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(162,155,254,.08));border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.6;margin-bottom:6px;border-left:3px solid #6c5ce7;min-height:40px}

/* ===== PHONICS IN WORD LIST ===== */
.word-item{background:#1a1a35;border:1px solid #2a2a50;border-radius:8px;padding:7px 9px;cursor:pointer;font-size:12px;transition:.2s}
.word-item:hover{border-color:#6c5ce7;background:#222250}
.word-item .w{font-weight:700}
.word-item .w .vowel{color:#fd79a8}
.word-item .w .cons{color:#81ecec}
.word-item .w .spk-btn{float:right;cursor:pointer;opacity:.4;font-size:10px;transition:.2s}
.word-item .w .spk-btn:hover{opacity:1;color:#a29bfe}
.word-item .sub{color:#636e72;font-size:11px;margin-top:1px}
.word-item .ph{display:none;margin-top:5px;padding:5px 7px;background:#2a2a50;border-radius:6px;font-size:10px;color:#a29bfe;border-left:2px solid #6c5ce7}
.word-item .ph .ph-rules{color:#636e72;font-size:9px;margin-top:2px}
.word-item .ph .ph-split{font-size:13px;font-family:monospace;color:#fff;letter-spacing:.5px}
.word-item .ph .ph-split .syl{color:#ffeaa7}
.word-item .ph .ph-split .sep{color:#636e72;margin:0 2px}
.word-item.open .ph{display:block}
.word-item.open{border-color:#6c5ce7;background:#222250}

/* ===== EXISTING STYLES REMAIN ===== */
.card{background:#1a1a35;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #2a2a50}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.badge{background:#6c5ce7;color:#fff;font-size:10px;padding:1px 8px;border-radius:8px;margin-left:auto;white-space:nowrap}
.badge.g{background:#00b894}
.badge.o{background:#e17055}
.badge.p{background:#fd79a8}

.grammar{border:1px solid #fd79a8;border-radius:8px;padding:10px;margin-bottom:10px;background:rgba(253,121,168,.08);font-size:12px}
.grammar .t{font-weight:700;color:#fd79a8;margin-bottom:3px}

.word-list{display:flex;flex-direction:column;gap:4px}

.rbox{border:1px solid #00b894;border-radius:8px;overflow:hidden}
.rtb{background:rgba(0,184,148,.12);padding:6px 10px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:600;border-bottom:1px solid rgba(0,184,148,.2)}
.rtb button{background:#00b894;color:#fff;border:none;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;transition:.2s}
.rtb button:hover{background:#00a381}
.rbody{padding:10px}
.rbody .en{font-size:13px;line-height:1.8;margin-bottom:6px;white-space:pre-line;color:#e0e0e0}
.rbody .cn{font-size:11px;color:#636e72;border-top:1px dashed #2a2a50;padding-top:5px}

.qbox{background:#2a2a50;border-radius:8px;padding:8px 10px;margin-bottom:6px;border-left:2px solid #6c5ce7}
.qbox .qt{font-weight:600;font-size:12px;margin-bottom:5px}
.qopts{display:flex;flex-direction:column;gap:3px}
.qopt{padding:4px 8px;border-radius:6px;border:1px solid #3a3a60;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:5px;transition:.2s;background:#1a1a35}
.qopt:hover{border-color:#6c5ce7;background:#2a2a60}
.qopt.ok{border-color:#00b894;background:rgba(0,184,148,.15)!important}
.qopt.bad{border-color:#e17055;background:rgba(225,112,85,.12)!important}
.qopt .ind{width:16px;height:16px;border-radius:50%;border:1px solid #3a3a60;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:.2s}
.qopt.ok .ind{background:#00b894;color:#fff;border-color:#00b894}
.qopt.bad .ind{background:#e17055;color:#fff;border-color:#e17055}
.qfb{display:none;margin-top:3px;font-size:10px;padding:2px 6px;border-radius:4px}
.qfb.show{display:block}
.qfb.correct{background:rgba(0,184,148,.1);color:#00b894}
.qfb.wrong{background:rgba(225,112,85,.1);color:#e17055}

.sbox{border:1px dashed #6c5ce7;border-radius:8px;padding:10px;background:#1a1a35}
.sbox .t{font-weight:600;font-size:12px;margin-bottom:5px;color:#a29bfe}
.sbtns{display:flex;gap:5px}
.sbtns button{background:#6c5ce7;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:.2s}
.sbtns button:hover{background:#7c6cf7}
.sbtns button:last-child{background:#3a3a60;color:#e0e0e0}
.sbtns button:last-child:hover{background:#4a4a70}
.sstat{margin-top:3px;font-size:10px;color:#636e72}
.sres{display:none;text-align:center;padding:6px}
.sres .l{font-size:10px;color:#636e72}
.sres .t{font-size:13px;font-weight:600;margin:3px 0;color:#a29bfe}
.sent-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.sent-chip{padding:3px 10px;border:1px solid #3a3a60;border-radius:12px;cursor:pointer;font-size:10px;background:#1a1a35;transition:.2s}
.sent-chip:hover{background:#2a2a50;border-color:#6c5ce7}
.save-area{text-align:center;padding:8px 0}
.btn-save{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border:none;padding:7px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;letter-spacing:1px}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,92,231,.4)}
.archive{background:#1a1a35;border-radius:10px;padding:14px;margin-bottom:10px;display:none;border:1px solid #2a2a50}
.archive.show{display:block}
.archive .t{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between;color:#e0e0e0}
.arch-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#2a2a50;border-radius:6px;border-left:2px solid #6c5ce7;font-size:11px;margin-bottom:3px}
.arch-item .del{background:none;border:none;color:#e17055;cursor:pointer;font-size:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>鉁?English Lab 鉁?/h1><div class="sub">phonics 路 grammar 路 speaking 路 reading</div></div>
<button class="btn" onclick="toggleArchive()">馃搧 Archive</button>
</div>
<div class="tabs" id="tabBar">
<div class="tab active" data-d="mon" onclick="go('mon')">馃摟 Mon</div>
<div class="tab" data-d="tue" onclick="go('tue')">馃憯 Tue</div>
<div class="tab" data-d="wed" onclick="go('wed')">馃捇 Wed</div>
<div class="tab" data-d="thu" onclick="go('thu')">馃敧 Thu</div>
<div class="tab" data-d="fri" onclick="go('fri')">鈽?Fri</div>
</div>
<div class="grid">
<div>
<!-- Scene Illustration Inserted by JS -->
<div class="scene-box" id="sceneBox"><div class="scene-bg"></div><div class="scene-art" id="sceneArt"></div><div class="scene-label" id="sceneLabel"></div></div>

<div class="grammar" id="grammarBox"><div class="t">Grammar: <span id="gTitle">Simple Present</span></div><div id="gRule">Facts, habits, truths.</div><div id="gEx">"I send" / "He sends"</div></div>

<div class="card"><div class="card-title">馃摉 Words <span class="badge">Tap for split</span></div><div class="word-list" id="wordList"></div></div>

<div class="card"><div class="card-title">馃摎 Reading <span class="badge g" id="themeBadge">Office</span></div>
<div class="rbox"><div class="rtb"><span id="themeLabel"></span><button onclick="readAloud()">馃攰 Listen</button></div><div class="rbody"><div class="en" id="passageEN"></div><div class="cn" id="passageCN"></div></div></div></div>

<div class="card"><div class="card-title">鉂?Questions <span class="badge o">Test</span></div><div id="qList"></div></div>
</div>
<div>
<!-- PHONICS TUTORIAL PANEL -->
<div class="ph-panel" id="phonicsPanel">
<div class="t"><span class="emo">鉁傦笍</span> Syllable Splitter</div>

<div class="tut-prompt" id="tutPrompt">馃憢 <b>Tap any word</b> below to see how it splits! Then try the rules 鈫?/div>

<div class="rule-cards" id="ruleCards">
<div class="rule-card vccv active" onclick="showRule('vccv')">
<div class="rc-title"><span class="rc-icon">鈻?/span> VCCV 鈥?Vowel-Consonant-Consonant-Vowel</div>
<div class="rc-desc"><b>Cut between</b> the two consonants</div>
<div class="rc-example">hap<span style="color:#ffeaa7">|</span>pen 鈫?hap路pen</div>
</div>
<div class="rule-card vcv" onclick="showRule('vcv')">
<div class="rc-title"><span class="rc-icon">鈻?/span> VCV 鈥?Vowel-Consonant-Vowel</div>
<div class="rc-desc">Usually cut <b>before</b> the consonant</div>
<div class="rc-example">o<span style="color:#ffeaa7">|</span>pen 鈫?o路pen</div>
</div>
<div class="rule-card other" onclick="showRule('other')">
<div class="rc-title"><span class="rc-icon">鈻?/span> More Rules</div>
<div class="rc-desc">馃攪 Silent e 路 馃懌 Vowel pairs 路 馃叞锔?R-controlled</div>
<div class="rc-example">sam<span style="color:#ffeaa7">|</span>ple 路 b<span style="color:#ffeaa7">oa</span>t 路 f<span style="color:#ffeaa7">ar</span>m</div>
</div>
</div>

<!-- Demo split box -->
<div class="split-demo" id="splitDemo">
<div class="sd-title">鉁傦笍 Watch it split</div>
<div class="sd-word" id="sdWord">sam<span style="color:#ffeaa7;">|</span>ple</div>
<div class="sd-result" id="sdResult">
<span class="syl">sam</span><span class="syl">ple</span>
</div>
<div class="sd-hint" id="sdHint">VCCV: cut between m and p 鉁傦笍</div>
</div>

<div class="tut-steps" id="tutSteps">
<div class="tut-step active" onclick="tutStep(0)">1. Find Vowels</div>
<div class="tut-step" onclick="tutStep(1)">2. Find Pattern</div>
<div class="tut-step" onclick="tutStep(2)">3. Cut & Blend</div>
</div>
</div>

<div class="card"><div class="card-title">馃帳 Speak <span class="badge p">Say it!</span></div>
<div class="sbox"><div class="t" id="targetSentence">Tap a sentence</div>
<div class="sbtns"><button onclick="startRec()" id="recBtn">馃敶 Record</button><button onclick="listenTarget()">馃攰 Listen</button></div>
<div class="sstat" id="recStatus"></div>
<div class="sres" id="recResult"><div class="l">You said:</div><div class="t" id="userSpeech"></div><div class="l" id="matchResult"></div><button onclick="resetRec()" style="margin-top:3px;background:transparent;border:1px solid #3a3a60;padding:2px 12px;border-radius:4px;cursor:pointer;font-size:10px;color:#636e72">鈫?Again</button></div></div>
<div class="sent-row" id="sentList"></div>
</div>
<div class="save-area"><button class="btn-save" onclick="saveWorksheet()">馃捑 Save Progress</button></div>
</div>
</div>
<div class="archive" id="archive"><div class="t"><span>馃搧 Saved Worksheets</span><button class="btn" onclick="toggleArchive()">鉁?Close</button></div><div id="archiveList"><div style="text-align:center;padding:12px;color:#636e72;font-size:12px">No worksheets saved yet.</div></div></div>
</div>

<script>
// ===== SCENE ILLUSTRATIONS (emoji art for each day) =====
var SCENES={
mon:['馃捈','馃摟','馃摓','馃搳','馃搵','馃搸','鉁夛笍','馃摤'],
tue:['馃憯','鈿栵笍','馃摫','馃搵','馃梻锔?,'馃攼','鉁嶏笍','馃搼'],
wed:['馃捇','馃寪','馃搱','馃','馃枼锔?,'馃敆','馃挼','馃搳'],
thu:['馃敧','馃嵆','馃ォ','馃殮','馃摝','馃敟','馃挃','馃攧'],
fri:['鈽?,'馃泲锔?,'馃槀','馃','馃幐','馃崟','馃挕','馃幁']};
var SCENE_TEXTS={
mon:'Office 路 Inquiry to Order',
tue:'Suits 路 The Call',
wed:'Social Network 路 The Deal',
thu:'The Bear 路 Kitchen Crisis',
fri:'Friends 路 Awkward Encounter'};

// ===== GRAMMAR =====
var G={mon:{t:'Simple Present',r:'Facts, habits, truths.',e:'"I send" / "He sends"'},
tue:{t:'Present Continuous',r:'Actions happening NOW.',e:'"I am calling"'},
wed:{t:'Simple Past',r:'Completed action. Add -ed.',e:'"I sent" / "He called"'},
thu:{t:'Present Perfect',r:'have/has + past participle.',e:'"I have sent"'},
fri:{t:'Future with Will',r:'Decisions, promises, plans.',e:'"I will send"'}};

// ===== PHONICS DATA (syllable split + rule per word) =====
var P={inquiry:{s:'in路qui路ry',b:'VCCV 鉁傦笍 cut between n,q',r:'vccv',c:'in<span class="sep">|</span>qui<span class="sep">|</span>ry'},
quotation:{s:'quo路ta路tion',b:'tion = /蕛蓹n/ 馃憛',r:'vcv',c:'quo<span class="sep">|</span>ta<span class="sep">|</span>tion'},
'lead time':{s:'lead time',b:'ea = /i藧/ (long E)',r:'other',c:'lead time'},
MOQ:{s:'M路O路Q',b:'Say each letter',r:'other',c:'M<span class="sep">|</span>O<span class="sep">|</span>Q'},
sample:{s:'sam路ple',b:'VCCV + silent e 鉁傦笍',r:'vccv',c:'sam<span class="sep">|</span>ple'},
'put through':{s:'put through',b:'ough = /u藧/',r:'other',c:'put through'},
clarify:{s:'clar路i路fy',b:'VCV + -ify = verb',r:'vcv',c:'clar<span class="sep">|</span>i<span class="sep">|</span>fy'},

'follow up':{s:'fol路low up',b:'double L = short O',r:'vccv',c:'fol<span class="sep">|</span>low up'},
'call back':{s:'call back',b:'all = /蓴藧l/',r:'other',c:'call back'},
negotiate:{s:'ne路go路ti路ate',b:'VCV pattern x3',r:'vcv',c:'ne<span class="sep">|</span>go<span class="sep">|</span>ti<span class="sep">|</span>ate'},
margin:{s:'mar路gin',b:'VCCV cut between r,g',r:'vccv',c:'mar<span class="sep">|</span>gin'},
compromise:{s:'com路pro路mise',b:'VCV + silent e',r:'vcv',c:'com<span class="sep">|</span>pro<span class="sep">|</span>mise'},
'win-win':{s:'win-win',b:'short I x2',r:'other',c:'win<span class="sep">|</span>win'},
flexible:{s:'flex路i路ble',b:'VCCV + -ble',r:'vccv',c:'flex<span class="sep">|</span>i<span class="sep">|</span>ble'},
defective:{s:'de路fec路tive',b:'VCV + VCCV',r:'vcv',c:'de<span class="sep">|</span>fec<span class="sep">|</span>tive'},
refund:{s:'re路fund',b:'VCV: re- prefix',r:'vcv',c:'re<span class="sep">|</span>fund'},

// ===== UPDATE SCENE ILLUSTRATION =====
function updateScene(day){
var emojis=SCENES[day]||['馃摎'];
// Scramble positions slightly
var art=document.getElementById('sceneArt');
var html='';
// Random order for visual interest
var shuffled=[...emojis];
for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]}
for(var i=0;i<shuffled.length;i++){
html+=shuffled[i];
// Add occasional spacing
if(i===2||i===5)html+='&nbsp;&nbsp;';
}
art.innerHTML=html;
document.getElementById('sceneLabel').textContent=SCENE_TEXTS[day]||'';
}

// ===== UPDATE SPLIT DEMO =====
function updateSplitDemo(word){
var ph=P[word];
if(!ph){document.getElementById('sdWord').innerHTML=word;document.getElementById('sdResult').innerHTML='';document.getElementById('sdHint').textContent='';return}
// Build colored word: vowels in pink, consonants in teal
var w=word;
var colored='';
for(var i=0;i<w.length;i++){
var ch=w[i];
if('aeiou'.indexOf(ch.toLowerCase())>=0) colored+='<span class="vowel">'+ch+'</span>';
else colored+='<span class="cons">'+ch+'</span>';
}
var sdWord=document.getElementById('sdWord');
sdWord.innerHTML=colored;
// Build split display
var parts=ph.s.split('路');
var resultHtml=parts.map(function(p){return '<span class="syl">'+p+'</span>'}).join('');
document.getElementById('sdResult').innerHTML=resultHtml;
document.getElementById('sdHint').textContent='Rule: '+ph.b;
}

// ===== SHOW RULE CARD =====
function showRule(rule){
document.querySelectorAll('.rule-card').forEach(function(c){c.classList.remove('active')});

}

// ===== QUESTION CHECK =====
function checkQ(qi,oi,ans){
if(qd[qi]) return;
var q=document.querySelectorAll('.qbox')[qi];if(!q)return;
var os=q.querySelectorAll('.qopt');
for(var i=0;i<os.length;i++){
if(i===ans) os[i].classList.add('ok');
if(i===oi&&oi!==ans) os[i].classList.add('bad');
}
qd[qi]=true;
var fb=document.getElementById('qfb'+qi);
if(fb){
if(oi===ans){fb.textContent='鉁?Correct!';fb.className='qfb show correct';}
else{fb.textContent='鉂?Answer: '+String.fromCharCode(65+ans);fb.className='qfb show wrong';}
}
}

function startRec(){
var s=document.getElementById('recStatus');var b=document.getElementById('recBtn');
if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){s.textContent='Chrome only.';return;}
if(rec&&rec.recognizing){rec.stop();b.textContent='馃敶 Record';s.textContent='';return;}
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;rec=new SR();
rec.lang='en-US';rec.recognizing=true;b.textContent='鈴?Stop';s.textContent='馃帳 Listening...';
rec.onresult=function(e){
var said=e.results[0][0].transcript;var conf=Math.round(e.results[0][0].confidence*100);
var tn=ts.toLowerCase().replace(/[^a-z\\s]/g,'').trim();
var un=said.toLowerCase().replace(/[^a-z\\s]/g,'').trim();
var tw=tn.split(/\\s+/);var uw=un.split(/\\s+/);
var m=0;for(var i=0;i<tw.length;i++){for(var j=0;j<uw.length;j++){if(tw[i]===uw[j]){m++;break;}}}
var r=Math.round(m/tw.length*100);
document.getElementById('recResult').style.display='block';
document.getElementById('userSpeech').textContent=said;
var fb=r>=90?'馃帀 Excellent! '+r+'%':r>=70?'馃憤 Good '+r+'%':r>=50?'馃挭 Getting there '+r+'%':'馃攧 Try again '+r+'%';
document.getElementById('matchResult').textContent=fb+' (c:'+conf+'%)';
b.textContent='馃敶 Record';rec.recognizing=false;
};
rec.onerror=function(){s.textContent='Err.';b.textContent='馃敶 Record';rec.recognizing=false;};
rec.onend=function(){if(b.textContent==='鈴?Stop'){b.textContent='馃敶 Record';rec.recognizing=false;}};
try{rec.start();}catch(e){}
}
function resetRec(){document.getElementById('recResult').style.display='none';}
