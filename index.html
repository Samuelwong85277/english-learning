<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L's English Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC',sans-serif;background:#eef1f5;color:#1e272e;padding:12px}
.container{max-width:800px;margin:0 auto}

.header{background:linear-gradient(135deg,#ff4757,#ff6348);border-radius:14px;padding:20px;color:#fff;margin-bottom:14px}
.header h1{font-size:24px;font-weight:800}
.header .sub{font-size:13px;opacity:.85;margin-top:3px}
.header .date{font-size:12px;opacity:.7;margin-top:6px}

.card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .badge{background:#2ed573;color:#fff;font-size:11px;padding:2px 10px;border-radius:10px;margin-left:auto;white-space:nowrap}

.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid #dfe6e9;background:#fff;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap}
.tab.active{border-color:#ff4757;background:#ff4757;color:#fff}

.word-list{display:flex;flex-direction:column;gap:6px}
.word-item{background:#f8f9fa;border:1.5px solid transparent;border-radius:10px;padding:10px 12px;cursor:pointer;transition:.2s}
.word-item:hover{border-color:#2ed573}
.word-item .top{display:flex;justify-content:space-between;align-items:flex-start}
.word-item .w{font-weight:700;font-size:15px}
.word-item .w .v{color:#ff4757;font-weight:800}
.word-item .p{font-size:12px;color:#57606f;margin:1px 0}
.word-item .m{font-size:13px;color:#ff4757;font-weight:500}
.word-item .ex{display:none;margin-top:6px;padding-top:6px;border-top:1px dashed #dfe6e9;font-size:12px;color:#57606f}
.word-item.open .ex{display:block}

.reading-box{border:1.5px solid #ffa502;border-radius:12px;overflow:hidden}
.reading-tb{background:#fff7e6;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ffe0b2;font-size:13px;font-weight:600}
.reading-tb button{background:#ffa502;color:#fff;border:none;padding:4px 14px;border-radius:14px;font-size:12px;cursor:pointer}
.reading-body{padding:14px}
.reading-body .en{font-size:15px;line-height:1.9;margin-bottom:10px}
.reading-body .cn{font-size:13px;line-height:1.7;color:#57606f;border-top:1px dashed #dfe6e9;padding-top:10px}

.q-box{background:#f8f9fa;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #2ed573}
.q-box .qt{font-weight:600;font-size:14px;margin-bottom:8px}
.q-opts{display:flex;flex-direction:column;gap:4px}
.q-opt{padding:7px 11px;border-radius:7px;border:1.5px solid #dfe6e9;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;transition:.15s}
.q-opt:hover{border-color:#2ed573;background:#e8fdf5}
.q-opt.ok{border-color:#2ed573;background:#d4f5e9}
.q-opt.bad{border-color:#ff4757;background:#ffebee}
</style>
</head>
<body>
<div class="container" id="app">

<div class="header">
  <h1>L's English Lab</h1>
  <div class="sub">Learn English through TV dramas | Phonics | Speak & Check</div>
  <div class="date" id="dateDisplay"></div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab" data-d="mon" onclick="go('mon')">Mon - Email</div>
  <div class="tab" data-d="tue" onclick="go('tue')">Tue - Phone</div>
  <div class="tab" data-d="wed" onclick="go('wed')">Wed - Deal</div>
  <div class="tab" data-d="thu" onclick="go('thu')">Thu - Service</div>
  <div class="tab" data-d="fri" onclick="go('fri')">Fri - Friends</div>
</div>

<div class="card">
  <div class="card-title">Words <span class="badge">Tap for example</span></div>
  <div class="word-list" id="wordList"></div>
</div>

<div class="card">
  <div class="card-title">Reading <span class="badge" id="themeLabel"></span></div>
  <div class="reading-box">
    <div class="reading-tb"><span id="themeText">[Theme]</span><button onclick="readAloud()">Listen</button></div>
    <div class="reading-body">
      <div class="en" id="passageEN"></div>
      <div class="cn" id="passageCN"></div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">Questions</div>
  <div id="qList"></div>
</div>

<div class="card">
  <div class="card-title">Speak & Check <span class="badge">Say it loud!</span></div>
  <div style="text-align:center;padding:10px 0" id="speakArea">
    <div style="font-weight:600;margin-bottom:8px;font-size:14px" id="targetSentence">Tap a sentence below</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button onclick="startRec()" id="recBtn" style="background:#ff4757;color:#fff;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px">Record</button>
      <button onclick="listenTarget()" style="background:#dfe6e9;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px">Listen</button>
    </div>
    <div id="recStatus" style="margin-top:6px;font-size:12px;color:#57606f;min-height:18px"></div>
  </div>
  <div id="recResult" style="display:none;text-align:center">
    <div style="font-size:13px;color:#57606f">You said:</div>
    <div style="font-size:16px;font-weight:600;margin:4px 0" id="userSpeech"></div>
    <div style="font-size:13px" id="matchResult"></div>
    <button onclick="resetRec()" style="margin-top:8px;background:transparent;border:1px solid #dfe6e9;padding:5px 16px;border-radius:16px;cursor:pointer;font-size:12px">Try Again</button>
  </div>
  <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #dfe6e9">
    <div style="font-size:12px;color:#57606f;margin-bottom:6px">Sentences:</div>
    <div id="sentList" style="display:flex;flex-wrap:wrap;gap:5px"></div>
  </div>
</div>

</div>

<script>
const DATA = {
  mon: {
    theme: 'The Office - Email Scene',
    words: [
      {w:'inquiry',p:'/in|kwir|ee/',m:'a question; asking for info',e:'Thank you for your inquiry about our products.'},
      {w:'quotation',p:'/kwo|tay|shun/',m:'a price offer',e:'We sent the quotation this morning.'},
      {w:'lead time',p:'/leed tym/',m:'time between order and delivery',e:'The lead time is 25 days.'},
      {w:'MOQ',p:'/em-oh-kyoo/',m:'minimum order quantity',e:'Our MOQ is 500 units.'},
      {w:'sample',p:'/sam|pul/',m:'a small piece to test',e:'We can send samples for free.'},
    ],
    passage: 'JIM: Did you send that email to the client yet?\n\nDWIGHT: Way ahead of you. I already sent a quotation.\n\nJIM: But they sent an inquiry first! They want to see samples.\n\nDWIGHT: Samples? This is a bulk order - 2,000 units!\n\nJIM: The lead time is 30 days, not 15. And MOQ is 500.',
    passageCN: 'Jim: 你给客户发邮件了吗? Dwight: 早发了。我已经报了价。Jim: 但他们先发了询盘,想看样品。Dwight: 样品?这可是2000件的大单!Jim: 交货期是30天不是15天。MOQ是500件。',
    questions: [
      {q:'Who already sent the quotation?', opts:['Jim','Dwight','The client','The boss'], ans:1},
      {q:'What does the client want to see?', opts:['The price','Samples','The contract','The factory'], ans:1},
      {q:'What is the real lead time?', opts:['15 days','25 days','30 days','45 days'], ans:2},
    ],
    sentences: [
      'Did you send that email yet?',
      'Way ahead of you!',
      'The lead time is 30 days.',
      'This is a bulk order with 2,000 units!',
    ]
  },
  tue: {
    theme: 'Suits - Phone Call',
    words: [
      {w:'put through',p:'/put throo/',m:'connect the call',e:'Please put me through to Mr. Specter.'},
      {w:'clarify',p:'/klar|i|fy/',m:'make clear',e:'Could you clarify the payment terms?'},
      {w:'deadline',p:'/ded|lyn/',m:'final time to finish',e:'The deadline is Friday at 5 PM.'},
      {w:'follow up',p:'/fol|oh up/',m:'check again later',e:'I will follow up after the meeting.'},
      {w:'call back',p:'/kal bak/',m:'return a call',e:'I will call you back in 10 minutes.'},
    ],
    passage: 'HARVEY: Mike, call the client now. Clarify the payment terms.\n\nMIKE: Got it. And what about the deadline?\n\nHARVEY: Tomorrow at 5 PM. No excuses. I will follow up with an email.\n\nMIKE: (on phone) Hello, this is Mike. I am calling to follow up. Can you clarify your position?\n\nCLIENT: We agree. Put me through to Mr. Specter.',
    passageCN: 'Harvey: Mike,现在给客户打电话。确认付款条件。Mike: 明白了。截止日期呢?Harvey: 明天下午5点。没有借口。我会发邮件跟进。Mike: (打电话)您好,我是Mike。我来电跟进。您能说明一下您的立场吗?客户: 我们同意。请帮我转接Specter先生。',
    questions: [
      {q:'What does Harvey ask Mike to clarify?', opts:['The price','The payment terms','The address','The date'], ans:1},
      {q:'When is the deadline?', opts:['Today at 3','Tomorrow at 5 PM','Next Monday','Friday'], ans:1},
      {q:'What will Harvey do after the call?', opts:['Visit the client','Send an email','Take a break','Call again'], ans:1},
    ],
    sentences: [
      'Call the client and clarify the terms.',
      'The deadline is tomorrow at 5 PM.',
      'Put me through to Mr. Specter.',
      'I will follow up with an email.',
    ]
  },
  wed: {
    theme: 'The Social Network - Negotiation',
    words: [
      {w:'negotiate',p:'/ne|go|shee|ayt/',m:'discuss to reach a deal',e:'We are willing to negotiate.'},
      {w:'margin',p:'/mar|jin/',m:'profit space',e:'Our margin is already thin.'},
      {w:'compromise',p:'/kom|pro|myz/',m:'meet in the middle',e:'Let us compromise.'},
      {w:'win-win',p:'/win-win/',m:'both sides benefit',e:'This is a win-win deal.'},
      {w:'flexible',p:'/flek|si|bul/',m:'able to change',e:'We can be flexible on price.'},
    ],
    passage: 'MARK: One million. Take it or leave it.\n\nSEAN: Come on. My margin is tight but I can be flexible. Let us find a compromise.\n\nMARK: 10% equity. No board seat.\n\nSEAN: 12% and one board seat. That is a win-win.\n\nMARK: Fine. 12%. But I do not like it.',
    passageCN: 'Mark: 100万。接受或者拉倒。Sean: 别这样。我利润空间不大但可以灵活。我们折中一下。Mark: 10%股权。没有董事会席位。Sean: 12%加一个席位。这是双赢。Mark: 行。12%。但我不是很喜欢这样。',
    questions: [
      {q:'What is Mark initial offer?', opts:['500k','1 million','2 million','5 million'], ans:1},
      {q:'What is the final equity?', opts:['10%','12%','15%','20%'], ans:1},
      {q:'What does win-win mean?', opts:['Only one wins','Both benefit','No deal','Someone loses'], ans:1},
    ],
    sentences: [
      'Take it or leave it.',
      'Let us find a compromise.',
      'This is a win-win situation.',
      'We can be flexible on the terms.',
    ]
  },
  thu: {
    theme: 'The Bear - Customer Service',
    words: [
      {w:'defective',p:'/de|fek|tiv/',m:'broken or damaged',e:'The products are defective.'},
      {w:'refund',p:'/ree|fund/',m:'money back',e:'We will give a full refund.'},
      {w:'apologize',p:'/a|pol|o|jyz/',m:'say sorry',e:'I apologize for the mistake.'},
      {w:'replacement',p:'/re|plays|ment/',m:'a new one instead',e:'We will send a replacement.'},
      {w:'inspect',p:'/in|spekt/',m:'check carefully',e:'Please inspect the goods.'},
    ],
    passage: 'RICHIE: What do you mean the order is wrong?\n\nCARMEN: Sir, I apologize. Let me inspect the issue.\n\nCUSTOMER: The meat arrived warm! It is defective!\n\nCARMEN: I understand. I will send a replacement today with express, free of charge. And a full refund.\n\nCUSTOMER: What about compensation?\n\nCARMEN: 20% off your next order. Does that sound fair?',
    passageCN: 'Richie: 什么叫订单错了? Carmen: 先生,我道歉。让我检查一下问题。客户: 肉送来是温的!有质量问题! Carmen: 我理解。我今天快递免费寄出换货,并全额退款。客户: 那赔偿呢? Carmen: 下次订单打8折。这样公平吗?',
    questions: [
      {q:'Why is the customer upset?', opts:['Late delivery','Wrong item','Meat arrived warm','Too expensive'], ans:2},
      {q:'What does Carmen offer first?', opts:['A discount','A replacement and refund','Free samples','An apology'], ans:1},
      {q:'What extra compensation is offered?', opts:['Free delivery','20% off next order','A gift card','Free meal'], ans:1},
    ],
    sentences: [
      'I apologize for the mistake.',
      'We will send a replacement today.',
      'Does that sound fair?',
      'Please inspect the goods upon arrival.',
    ]
  },
  fri: {
    theme: 'Friends - Cultural Differences',
    words: [
      {w:'awkward',p:'/ak|word/',m:'uncomfortable situation',e:'That was so awkward.'},
      {w:'polite',p:'/po|lyt/',m:'showing good manners',e:'It is polite to say thank you.'},
      {w:'offer',p:'/of|er/',m:'give the chance to accept',e:'He offered to help.'},
      {w:'tip',p:'/tip/',m:'helpful advice',e:'Here is a tip for you.'},
      {w:'weird',p:'/weerd/',m:'strange',e:'That is really weird.'},
    ],
    passage: 'MONICA: I met a guy from Japan. He bowed when we shook hands!\n\nPHOEBE: That is cultural! Bowing is polite in Japan.\n\nMONICA: I felt so awkward!\n\nCHANDLER: Here is a tip - bow back next time. Or nod and smile.\n\nRACHEL: And she tried to offer him coffee, but he kept saying no!\n\nPHOEBE: In Japan, it is polite to refuse at first! You learned something today.',
    passageCN: 'Monica: 我遇到一个日本男生。握手的时候他鞠躬了! Phoebe: 那是文化差异!在日本鞠躬是礼貌的。Monica: 我觉得好尴尬! Chandler: 给你个建议——下次鞠躬回去。或者点头微笑。Rachel: 而且她想请他喝咖啡,他一直拒绝! Phoebe: 在日本第一次拒绝是礼貌!你今天学到了。',
    questions: [
      {q:'Why did the Japanese man bow?', opts:['He was shy','It is cultural','He made a mistake','He was joking'], ans:1},
      {q:'How did Monica feel?', opts:['Happy','Angry','Awkward','Excited'], ans:2},
      {q:'What is Chandlers tip?', opts:['Do not bow','Bow or nod','Walk away','Call him'], ans:1},
    ],
    sentences: [
      'I felt so awkward!',
      'That is not weird, that is cultural.',
      'Here is a tip for next time.',
      'It is polite to say thank you.',
    ]
  }
};

let curDay = 'mon';
let rec = null;
let targetSent = '';

function go(d) {
  curDay = d;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.d === d));
  const dt = DATA[d];
  if (!dt) return;

  // Theme
  document.getElementById('themeText').textContent = dt.theme;
  document.getElementById('themeLabel').textContent = dt.theme;

  // Words
  document.getElementById('wordList').innerHTML = dt.words.map(w =>
    '<div class="word-item" onclick="this.classList.toggle(\'open\')">' +
    '<div class="top"><div>' +
    '<div class="w">' + w.w + '</div>' +
    '<div class="p">' + w.p + '</div>' +
    '<div class="m">' + w.m + '</div>' +
    '</div></div>' +
    '<div class="ex">' + w.e + '</div></div>'
  ).join('');

  // Passage
  document.getElementById('passageEN').textContent = dt.passage;
  document.getElementById('passageCN').textContent = dt.passageCN;

  // Questions
  document.getElementById('qList').innerHTML = dt.questions.map((q, i) =>
    '<div class="q-box">' +
    '<div class="qt">' + (i+1) + '. ' + q.q + '</div>' +
    '<div class="q-opts">' +
    q.opts.map((o, j) =>
      '<div class="q-opt" onclick="checkQ(this,' + i + ',' + j + ',' + q.ans + ')">' + o + '</div>'
    ).join('') +
    '</div></div>'
  ).join('');

  // Sentences for speaking
  const list = document.getElementById('sentList');
  list.innerHTML = dt.sentences.map(s =>
    '<span onclick="pickSent(\'' + s.replace(/'/g, "\\'") + '\')" style="padding:5px 12px;border-radius:14px;border:1.5px solid #dfe6e9;cursor:pointer;font-size:12px;background:#fff">' + s.substring(0, 25) + (s.length > 25 ? '...' : '') + '</span>'
  ).join('');

  if (dt.sentences.length > 0) pickSent(dt.sentences[0]);
}

let qDone = {};
function checkQ(el, qi, oi, ans) {
  if (qDone[qi]) return;
  const opts = el.parentElement.querySelectorAll('.q-opt');
  opts.forEach((o, i) => {
    if (i === ans) o.classList.add('ok');
    if (i === oi && oi !== ans) o.classList.add('bad');
  });
  qDone[qi] = true;
}

function readAloud() {
  if ('speechSynthesis' in window) {
    const t = document.getElementById('passageEN').textContent;
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US'; u.rate = 0.8;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function pickSent(s) {
  targetSent = s;
  document.getElementById('targetSentence').textContent = '"' + s + '"';
  document.getElementById('speakArea').style.display = 'block';
  document.getElementById('recResult').style.display = 'none';
}

function listenTarget() {
  if ('speechSynthesis' in window && targetSent) {
    const u = new SpeechSynthesisUtterance(targetSent);
    u.lang = 'en-US'; u.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function startRec() {
  const status = document.getElementById('recStatus');
  const btn = document.getElementById('recBtn');

  if (!('webkitSpeechRecognition' in window)) {
    status.textContent = 'Speech recognition not available. Use Chrome.';
    return;
  }

  if (rec && rec.recognizing) {
    rec.stop();
    btn.textContent = 'Record';
    status.textContent = '';
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR();
  rec.lang = 'en-US';
  rec.recognizing = true;
  btn.textContent = 'Stop';
  status.textContent = 'Listening...';

  rec.onresult = function(e) {
    const said = e.results[0][0].transcript;
    const conf = Math.round(e.results[0][0].confidence * 100);

    // Compare
    const tNorm = targetSent.toLowerCase().replace(/[^a-z\s]/g, '').trim();
    const uNorm = said.toLowerCase().replace(/[^a-z\s]/g, '').trim();
    const tWords = tNorm.split(/\s+/);
    const uWords = uNorm.split(/\s+/);
    let match = 0;
    tWords.forEach(w => { if (uWords.includes(w)) match++; });
    const rate = Math.round(match / tWords.length * 100);

    document.getElementById('speakArea').style.display = 'none';
    document.getElementById('recResult').style.display = 'block';
    document.getElementById('userSpeech').textContent = said;

    let feedback = '';
    if (rate >= 90) feedback = 'Excellent! ' + rate + '% match';
    else if (rate >= 70) feedback = 'Good! ' + rate + '% match';
    else if (rate >= 50) feedback = 'Getting there! ' + rate + '% match';
    else feedback = 'Keep practicing! ' + rate + '% match';

    document.getElementById('matchResult').textContent = feedback + ' (confidence: ' + conf + '%)';
    document.getElementById('matchResult').style.color = rate >= 70 ? '#2ed573' : '#ffa502';

    btn.textContent = 'Record';
    rec.recognizing = false;
  };

  rec.onerror = function() {
    status.textContent = 'Error. Try again.';
    btn.textContent = 'Record';
    rec.recognizing = false;
  };

  try { rec.start(); } catch(e) {}
}

function resetRec() {
  document.getElementById('recResult').style.display = 'none';
  document.getElementById('speakArea').style.display = 'block';
}

// Init
document.addEventListener('DOMContentLoaded', function() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('dateDisplay').textContent = days[now.getDay()] + ' ' + now.getDate() + ' ' + now.getFullYear();
  const map = {'1':'mon','2':'tue','3':'wed','4':'thu','5':'fri'};
  go(map[now.getDay()] || 'mon');
});
</script>
</body>
</html>
